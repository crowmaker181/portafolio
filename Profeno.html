<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje para Jorge</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    .card-custom {
      background: #111;
      border: 2px solid gold;
      border-radius: 15px;
      padding: 30px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    .imagen-box {
      margin-top: 20px;
    }

    .imagen-box img {
      max-width: 200px;
    }

    .cara {
      font-size: 40px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <main>
    <section class="card-custom">

      <h1>Mensaje importante </h1>

      <p class="cara">>:C</p>

      <p>
        Jorge... ¿por qué abriste el proyecto? 😤<br><br>
        Este portafolio fue hecho con esfuerzo, café y bugs que dolieron 😔☕<br><br>
        Míralo con cariño profe... no con odio 😭
      </p>

      <!-- ESPACIO PARA IMAGEN -->
      <section class="imagen-box">
       

        <img src="https://i.pinimg.com/736x/25/ce/b4/25ceb420c4bce880576c72bb09a7fa87.jpg" alt="Bootstrap Logo">
      </section>

    </section>
  </main>

</body>
</html>
