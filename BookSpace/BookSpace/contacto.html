<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSpace — Contacto</title>
  <link rel="stylesheet" href="BookSpace.css">
</head>
<body>

  <header class="navbar">
    <div class="container nav-content">
      <h1 class="logo">📚 BookSpace</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="libros.html">Libros</a></li>
          <li><a href="autores.html">Autores</a></li>
          <li><a href="categorias.html">Categorías</a></li>
          <li><a href="comunidad.html">Comunidad</a></li>
          <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="contacto">
      <div class="container">
        <h2>Contáctanos</h2>
        <form class="contact-form">
          <input type="text" placeholder="Nombre completo" required>
          <input type="email" placeholder="Correo electrónico" required>
          <textarea placeholder="Tu mensaje" required></textarea>
          <button class="btn-primary">Enviar mensaje</button>
        </form>
      </div>
    </section>
  </main>
  <button id="translate-button">
    🌐 Traducir (ES/EN)
  </button>

  <footer class="footer">
    <p>© 2025 BookSpace</p>
  </footer>

  <!-- 🔘 Botón de cambio de tema -->
  <button id="toggle-theme" style="position: fixed; bottom: 15px; right: 15px; padding: 10px; border-radius: 5px; cursor: pointer;">
    🌞 / 🌙
  </button>

  <!-- Script del cambio de tema -->
  <script src="modo claro oscuro.js" defer></script>
  <script src="traductor.js" defer></script>
</body>
</html>
